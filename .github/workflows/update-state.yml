name: Update Project State

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Collect metrics
        id: metrics
        run: |
          TEST_OUTPUT=$(npx vitest run --reporter=verbose 2>&1)
          TEST_FILES=$(echo "$TEST_OUTPUT" | grep 'Test Files' | head -1 || echo "unbekannt")
          TESTS_LINE=$(echo "$TEST_OUTPUT" | grep 'Tests' | head -1 || echo "unbekannt")
          echo "test_files=$TEST_FILES" >> "$GITHUB_OUTPUT"
          echo "tests=$TESTS_LINE" >> "$GITHUB_OUTPUT"

      - name: Update PROJECT_STATE.md
        run: |
          cat > PROJECT_STATE.md << 'STATEEOF'
          # Projekt-Status

          Letzte Aktualisierung: __DATE__

          ## CI Status

          Letzter erfolgreicher Run: __DATE__
          __TEST_FILES__
          __TESTS__

          ## Was funktioniert (durch Tests verifiziert)

          - validateConfig: tests/unit/validate.test.ts
          - parseSpec: tests/unit/spec-parser.test.ts

          ## Was kaputt ist

          - Nichts — alle Tests grün

          ## Nächste Schritte

          - Siehe GitHub Issues

          ## Metriken

          - Letzter CI-Run: __SHORT_DATE__
          - Offene Issues: wird über GitHub Issues getrackt
          STATEEOF
          sed -i 's/^          //' PROJECT_STATE.md
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHORT_DATE=$(date -u +%Y-%m-%d)
          sed -i "s|__DATE__|$DATE|g" PROJECT_STATE.md
          sed -i "s|__SHORT_DATE__|$SHORT_DATE|g" PROJECT_STATE.md
          sed -i "s|__TEST_FILES__|${{ steps.metrics.outputs.test_files }}|g" PROJECT_STATE.md
          sed -i "s|__TESTS__|${{ steps.metrics.outputs.tests }}|g" PROJECT_STATE.md

      - name: Commit and create PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PROJECT_STATE.md
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
            exit 0
          fi
          BRANCH="chore/update-state-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update project state"
          git push origin "$BRANCH"
          gh pr create --title "chore: update project state" --body "Automatisches Update nach erfolgreichem CI-Run." --base main --head "$BRANCH"
          gh pr merge "$BRANCH" --merge --auto --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
